controller_server:
  ros__parameters:

    use_sim_time: false

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      min_vel_x: 0.0
      max_vel_x: 0.3

      min_vel_theta: 0.0
      max_vel_theta: 1.0

      acc_lim_x: 1.0
      acc_lim_theta: 2.0

      vx_samples: 20
      vtheta_samples: 20

      sim_time: 1.7

      critics: [
        "RotateToGoal",
        "ObstacleFootprint",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      RotateToGoal.scale: 32.0
      ObstacleFootprint.scale: 0.02
      GoalAlign.scale: 24.0
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0