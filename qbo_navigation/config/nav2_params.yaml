# ================================
# CONTROLLER
# ================================
controller_server:
  ros__parameters:

    use_sim_time: false

    odom_topic: /qbo_arduqbo/base_ctrl/odom
    cmd_vel_topic: /qbo_arduqbo/base_ctrl/cmd_vel

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      min_vel_x: 0.0
      max_vel_x: 0.5

      min_vel_theta: 0.0
      max_vel_theta: 1.0

      acc_lim_x: 1.0
      acc_lim_theta: 2.0

      vx_samples: 20
      vtheta_samples: 20

      sim_time: 1.7           # temps de simulation pour évaluer les trajectoires

      critics: [
        "RotateToGoal",       # permet au robot de tourner sur lui même pour faire face à l'objectif
        "ObstacleFootprint",  # permet au robot de détecter les obstacles autour de lui
        "GoalAlign",          # permet au robot de s'aligner avec l'objectif
        "PathAlign",          # permet au robot de s'aligner avec le chemin
        "PathDist",           # permet au robot de suivre la distance par rapport au chemin
        "GoalDist"            # permet au robot de suivre la distance par rapport à l'objectif
      ]

      RotateToGoal.scale: 32.0
      ObstacleFootprint.scale: 0.02
      GoalAlign.scale: 24.0
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0

# ================================
# PLANNER
# ================================
planner_server:
  ros__parameters:

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      use_astar: false
      tolerance: 1.0
      allow_unknown: true

# ================================
# BT NAVIGATOR
# ================================
bt_navigator:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_link

# ================================
# LOCAL COSTMAP (VOXEL)
# ================================
local_costmap:
  local_costmap:
    ros__parameters:

      update_frequency: 5.0
      publish_frequency: 2.0

      transform_tolerance: 2.5

      odom_topic: /qbo_arduqbo/base_ctrl/odom

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 2
      height: 2
      resolution: 0.05

      track_unknown_space: false

      footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
      # robot_radius: 0.2

      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        footprint_clearing_enabled: true

        transform_tolerance: 2.5

        publish_voxel_map: true
        voxel_map_topic: voxel_map

        origin_z: 0.0
        z_resolution: 0.1
        z_voxels: 10

        max_obstacle_height: 1.5
        min_obstacle_height: 0.2
        unknown_threshold: 15
        mark_threshold: 0

        tf_filter_tolerance: 2.5
        observation_sources: depth_points

        depth_points:
          topic: /camera_d435/camera_d435/depth/color/points
          data_type: PointCloud2
          sensor_frame: camera_depth_optical_frame
          expected_update_rate: 10.0
          observation_persistence: 0.0
          message_filter_queue_size: 50

          marking: true
          clearing: true

          obstacle_max_range: 2.5
          obstacle_min_range: 0.5
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0

          min_obstacle_height: 0.4
          max_obstacle_height: 1.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0

# ================================
# GLOBAL COSTMAP
# ================================
global_costmap:
  global_costmap:
    ros__parameters:

      update_frequency: 1.0
      publish_frequency: 1.0

      odom_topic: /qbo_arduqbo/base_ctrl/odom

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      track_unknown_space: false

      transform_tolerance: 2.5

      footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
      # robot_radius: 0.2

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        footprint_clearing_enabled: true
        observation_sources: depth_points

        tf_filter_tolerance: 2.5

        depth_points:
          topic: /camera_d435/camera_d435/depth/color/points
          data_type: "PointCloud2"
          sensor_frame: camera_depth_optical_frame
          message_filter_queue_size: 50

          clearing: true
          marking: true

          expected_update_rate: 10.0
          observation_persistence: 0.0

          obstacle_max_range: 2.5
          obstacle_min_range: 0.5

          raytrace_max_range: 3.0
          raytrace_min_range: 0.0

          min_obstacle_height: 0.4
          max_obstacle_height: 1.5

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.30
        cost_scaling_factor: 3.0