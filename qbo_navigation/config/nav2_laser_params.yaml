# ================================
# CONTROLLER
# ================================
controller_server:
  ros__parameters:

    use_sim_time: false

    odom_topic: /qbo_arduqbo/base_ctrl/odom
    cmd_vel_topic: /qbo_arduqbo/base_ctrl/cmd_vel

    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"

      debug_trajectory_details: false

      min_vel_x: 0.0
      max_vel_x: 0.3

      min_vel_theta: 0.0
      max_vel_theta: 1.0

      acc_lim_x: 1.0
      acc_lim_theta: 2.0

      vx_samples: 20
      vtheta_samples: 20

      sim_time: 1.7

      critics: [
        "RotateToGoal",
        "ObstacleFootprint",
        "GoalAlign",
        "PathAlign",
        "PathDist",
        "GoalDist"
      ]

      RotateToGoal.scale: 32.0
      ObstacleFootprint.scale: 0.02
      GoalAlign.scale: 24.0
      PathAlign.scale: 32.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0

# ================================
# PLANNER
# ================================
planner_server:
  ros__parameters:
    use_sim_time: false

    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      allow_unknown: true

# ================================
# BT NAVIGATOR
# ================================
bt_navigator:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_link
    use_sim_time: false

# ================================
# LOCAL COSTMAP (SCAN)
# ================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0

      global_frame: odom
      robot_base_frame: base_link

      rolling_window: true
      width: 4
      height: 4
      resolution: 0.05

      transform_tolerance: 1.0

      footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true

        observation_sources: scan

        tf_filter_tolerance: 1.0

        scan:
          topic: /scan
          data_type: "LaserScan"
          sensor_frame: camera_link


          clearing: true
          marking: true

          obstacle_max_range: 2.5
          obstacle_min_range: 0.2

          raytrace_max_range: 3.0
          raytrace_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 3.0


# ================================
# GLOBAL COSTMAP (SCAN)
# ================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0

      global_frame: odom
      robot_base_frame: base_link

      width: 10
      height: 10
      resolution: 0.05

      transform_tolerance: 1.0

      track_unknown_space: false

      rolling_window: true

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"

        observation_sources: scan

        tf_filter_tolerance: 1.0

        scan:
          topic: /scan
          data_type: "LaserScan"

          sensor_frame: camera_link

          clearing: true
          marking: true

          obstacle_max_range: 2.5
          raytrace_max_range: 3.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35

recoveries_server:
  ros__parameters:
    use_sim_time: false

lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - recoveries_server
      - bt_navigator