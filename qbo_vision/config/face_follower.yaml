qbo_face_following:
  ros__parameters:
    move_base: true
    move_head: true
    send_stop: false

    # Auto-disable movements when tracker is DISABLED for this duration (seconds)
    auto_disable_timeout: 10.0

    search_pan_vel: 0.6
    search_pan_step: 0.2
    search_min_pan: -1.0
    search_max_pan: 1.0

    search_tilt_vel: 0.6
    search_tilt_levels: [-0.5, 0.0, 0.3]
    search_min_tilt: -0.5
    search_max_tilt: 0.3

    scan_interval: 2.0
    search_pause_duration: 1.0

    desired_distance: 1.2

    # PID gains for head control (higher values = faster/more reactive tracking)
    # Pan (horizontal) control
    head_pan_kp: 0.005    # Proportional gain (responsiveness)
    head_pan_ki: 0.0003   # Integral gain (steady-state error)
    head_pan_kd: 0.001    # Derivative gain (damping/smoothness)

    # Tilt (vertical) control
    head_tilt_kp: 0.005   # Proportional gain (responsiveness)
    head_tilt_ki: 0.0003  # Integral gain (steady-state error)
    head_tilt_kd: 0.001   # Derivative gain (damping/smoothness)

    # PID gains for base control (higher values = faster/more reactive movement)
    # Distance control (forward/backward)
    base_distance_kp: 0.35   # Proportional gain (approach speed)
    base_distance_ki: 0.02   # Integral gain (maintains target distance)
    base_distance_kd: 0.15   # Derivative gain (smooth deceleration)

    # Yaw control (rotation left/right)
    base_yaw_kp: 0.35        # Proportional gain (synchronized with head movement)
    base_yaw_ki: 0.01        # Integral gain (eliminates drift)
    base_yaw_kd: 0.05        # Derivative gain (smooth rotation)

    # Base control configuration
    base_cmd_vel_topic: "/qbo_arduqbo/base_ctrl/cmd_vel"  # Topic for base velocity commands
    invert_linear_vel: false  # Set to true if forward command makes base go backward
    camera_info_topic: "camera_left/camera_info"  # Topic for camera calibration info

