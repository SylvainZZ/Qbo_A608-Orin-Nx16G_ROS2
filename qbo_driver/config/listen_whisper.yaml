/qbo_listen:
  ros__parameters:
    # --------------------
    # Capture audio
    # --------------------
    # Frequence d'echantillonnage d'entree (Hz).
    sample_rate: 16000

    # Nombre de canaux ouverts sur la carte son.
    # Exemple: certains micros USB imposent 2 canaux meme si l'on traite en mono.
    audio_channels_opened: 2

    # Canal utilise pour l'ASR (index base 0).
    asr_channel_index: 1

    # --------------------
    # VAD / segmentation parole
    # --------------------
    # Taille d'une frame audio (10 ou 20 ms recommande).
    frame_ms: 20

    # Active la detection de voix (Voice Activity Detection).
    vad_enabled: true

    # Sensibilite VAD (0 a 3): plus haut = plus strict.
    vad_mode: 2

    # Nombre de frames silencieuses pour cloturer une utterance.
    # 20 frames a 20 ms = 400 ms.
    silence_frames_end: 20

    # Duree minimale d'une utterance valide (ms).
    min_utt_ms: 400

    # Duree maximale d'une utterance (evite les longues nappes de bruit/musique).
    max_utt_ms: 4000

    # Ratio minimum de frames "voix" dans l'utterance pour l'accepter.
    min_speech_ratio: 0.50

    # --------------------
    # Interaction avec le TTS
    # --------------------
    # Fenetre d'ignore apres une sortie TTS pour eviter l'auto-ecoute (ms).
    tts_ignore_ms: 500

    # --------------------
    # Whisper / inference
    # --------------------
    # Langue systeme attendue (aide le decodage).
    system_lang: "fr"

    # Taille du modele Whisper: tiny, base, small, medium, large.
    whisper_model: "small"

    # Device de calcul: "cpu" ou "cuda".
    whisper_device: "cuda"

    # Affiche les sources d'entree detectees au demarrage.
    list_input_sources_on_start: false

    # Active les logs detailles des metriques de segment.
    debug_segment_metrics: false

    # --------------------
    # Validation transcription
    # --------------------
    # Seuil minimum de confiance pour accepter une transcription (0.0 a 1.0).
    min_confidence: 0.5
