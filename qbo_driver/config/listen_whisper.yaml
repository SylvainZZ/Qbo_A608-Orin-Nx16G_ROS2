/qbo_listen:
  ros__parameters:
    # --------------------
    # Capture audio
    # --------------------
    # Pattern pour trouver la source audio dans PulseAudio (via 'pactl list short sources').
    # Exemples: "reSpeaker_XVF3800", "Seeed", "XVF3800", etc.
    #
    # Fonctionnement:
    # - Si pattern defini: trouve et configure la source PulseAudio automatiquement (pactl set-default-source).
    #   Le node ouvre ensuite le device ALSA "default" qui est route par PulseAudio.
    # - Si vide (""): utilise le device par defaut du systeme.
    #
    # Note: Si la source n'est pas trouvee, le node s'arrete avec une erreur.
    pulseaudio_source_pattern: "reSpeaker_XVF3800"

    # Frequence d'echantillonnage d'entree (Hz).
    sample_rate: 16000

    # Nombre de canaux ouverts sur la carte son.
    # Exemple: certains micros USB imposent 2 canaux meme si l'on traite en mono.
    audio_channels_opened: 2

    # Canal utilise pour l'ASR (index base 0).
    asr_channel_index: 1

    # --------------------
    # VAD / segmentation parole
    # --------------------
    # Taille d'une frame audio (10 ou 20 ms recommande).
    frame_ms: 20

    # Active la detection de voix (Voice Activity Detection).
    vad_enabled: true

    # Sensibilite VAD (0 a 3): plus haut = plus strict.
    vad_mode: 2

    # Nombre de frames silencieuses pour cloturer une utterance (comportement normal).
    # 20 frames a 20 ms = 400 ms.
    silence_frames_end: 20

    # Nombre de frames silencieuses OBLIGATOIRES apres timeout pour forcer la cloture.
    # Evite de couper en plein milieu si la personne parle encore apres max_utt_ms.
    # 40 frames a 20 ms = 800 ms.
    hard_stop_frames: 40

    # Nombre de frames de contexte AVANT la detection de parole (pre-roll).
    # 15 frames a 20 ms = 300 ms. Permet de capturer le debut des phrases.
    pre_roll_frames: 15

    # Duree minimale d'une utterance valide (ms).
    # Reduit a 300ms pour accepter les phrases courtes (2-3 mots).
    min_utt_ms: 300

    # Duree maximale d'une utterance (ms) - TIMEOUT SOUPLE.
    # Apres ce delai, le systeme attend un silence long (hard_stop_frames) avant de clore.
    # Cela evite de couper une phrase en plein milieu si la personne parle encore.
    # Hard cap absolu: 15 secondes (securite).
    max_utt_ms: 10000

    # Ratio minimum de frames "voix" (detection VAD) dans l'utterance.
    # NOTE: Filtrage desormais tres permissif pour eviter de rejeter des phrases valides.
    # Seuls les segments TRES courts (<800ms) avec quasi aucune voix (<15%) sont filtres.
    # La validation repose principalement sur Whisper (confidence + blacklist hallucinations).
    min_speech_ratio: 0.15

    # --------------------
    # Interaction avec le TTS
    # --------------------
    # Fenetre d'ignore apres une sortie TTS pour eviter l'auto-ecoute (ms).
    tts_ignore_ms: 500

    # --------------------
    # Whisper / inference
    # --------------------
    # Langue systeme attendue (aide le decodage).
    system_lang: "fr"

    # Taille du modele Whisper: tiny, base, small, medium, large.
    whisper_model: "small"

    # Device de calcul: "cpu" ou "cuda".
    whisper_device: "cuda"

    # Active les logs detailles des metriques de segment.
    debug_segment_metrics: false

    # --------------------
    # Validation transcription
    # --------------------
    # Seuil minimum de confiance pour accepter une transcription (0.0 a 1.0).
    min_confidence: 0.5
